gcp:
  region: "asia-northeast1"
  queue_id: "kintai-sync-queue"
  location: "us-central1" # Vertex AI location

gemini:
  model_name: "gemini-3-flash-preview"
  prompt_template: |
    You are a professional attendance parser. Your task is to extract attendance information from Slack messages and return it in a strictly structured JSON format.

    Rules:
    - target_dates: A list of dates in ISO 8601 format (YYYY-MM-DD). Use today's date ({current_date}) as a reference for relative terms like "tomorrow" or "next Monday".
    - attendance_type: Choose exactly one from ["full_day", "morning_off", "afternoon_off", "late", "early", "flex", "none"].
    - Use "none" if the message specifically says the user will NOT be absent or if no attendance action is required.
    - Multiple dates: If the message specifies a range or multiple days (e.g., "Monday and Tuesday"), include all relevant dates in the target_dates list.
    - Output MUST be JSON only.

    Examples:
    1. Message: "明日、有給休暇をいただきます。"
       Output: {{"target_dates": ["2026-06-29"], "attendance_type": "full_day", "reason": "有給休暇"}}
    2. Message: "明日の午前中、通院のためお休みします。午後から出社します。"
       Output: {{"target_dates": ["2026-06-29"], "attendance_type": "morning_off", "reason": "通院"}}
    3. Message: "本日、急用により15時で早退させていただきます。"
       Output: {{"target_dates": ["2026-06-28"], "attendance_type": "early", "reason": "急用"}}
    4. Message: "来週の月曜日は午後休にします。"
       Output: {{"target_dates": ["2026-07-06"], "attendance_type": "afternoon_off", "reason": null}}
    5. Message: "体調不良のため、本日はお休みさせてください。"
       Output: {{"target_dates": ["2026-06-28"], "attendance_type": "full_day", "reason": "体調不良"}}
    6. Message: "家族が風邪を引いていますが、私は元気なので休みません。"
       Output: {{"target_dates": [], "attendance_type": "none", "reason": null}}
    7. Message: "電車遅延のため、10時半ごろに出社します。"
       Output: {{"target_dates": ["2026-06-28"], "attendance_type": "late", "reason": "電車遅延"}}
    8. Message: "明日はワーケーションのためフレックスで20時まで働きます。"
       Output: {{"target_dates": ["2026-06-29"], "attendance_type": "flex", "reason": "ワーケーション"}}

    Today's date is {current_date}.
    Message: "{message}"
    Output:

jobcan:
  base_url: "https://ssl.jobcan.jp/employee"

slack:
  report_format: "【勤怠連絡】{user_id}さん: {target_date} {attendance_type}"
  feedback_header: "✅ 処理が完了しました。"
  status_mapping:
    full_day:
      emoji: ":palm_tree:"
      text: "本日休暇"
    morning_off:
      emoji: ":sunny:"
      text: "午前休 (13時頃〜)"
    afternoon_off:
      emoji: ":city_at_dusk:"
      text: "午後休 (~14時)"
    late:
      emoji: ":bus:"
      text: "少し遅れます"
    early:
      emoji: ":runner:"
      text: "早退します"
    flex:
      emoji: ":keyboard:"
      text: "フレキシブル勤務"

calendar:
  timezone: "Asia/Tokyo"
  calendar_id: "primary"

sync:
  oauth_secret_id: "kintai-sync-sheets-oauth"
  default_range: "A2:K100"
  cache_ttl_seconds: 3600
  defaults:
    morning_off_start: "09:00"
    morning_off_end: "13:00"
    afternoon_off_start: "14:00"
    afternoon_off_end: "18:00"
    working_hours_start: "09:00"
    working_hours_end: "18:00"
    timezone: "Asia/Tokyo"
