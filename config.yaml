gcp:
  region: "asia-northeast1"
  queue_id: "kintai-sync-queue"
  location: "us-central1" # Vertex AI location

gemini:
  model_name: "gemini-3-flash-preview"
  prompt_template: |
    Extract attendance information from the following Slack message.
    Today's date is {current_date}.
    
    Message: "{message}"
    
    Output must be a JSON object with the following keys:
    - target_date: ISO 8601 format (YYYY-MM-DD), or null if not applicable
    - attendance_type: One of "full_day", "morning_off", "afternoon_off", "late", "early", "flex", "none"
    - reason: Brief reason for the attendance change
    
    If the message does not indicate any change to attendance (e.g., "I will not be absent"), set attendance_type to "none" and target_date to null.

jobcan:
  base_url: "https://ssl.jobcan.jp/employee"

slack:
  report_format: "【勤怠連絡】{user_id}さん: {target_date} {attendance_type}"
  feedback_header: "✅ 処理が完了しました。"
  status_mapping:
    full_day:
      emoji: ":palm_tree:"
      text: "本日休暇"
    morning_off:
      emoji: ":sunny:"
      text: "午前休 (13時頃〜)"
    afternoon_off:
      emoji: ":city_at_dusk:"
      text: "午後休 (~14時)"
    late:
      emoji: ":bus:"
      text: "少し遅れます"
    early:
      emoji: ":runner:"
      text: "早退します"
    flex:
      emoji: ":keyboard:"
      text: "フレキシブル勤務"

calendar:
  timezone: "Asia/Tokyo"
  calendar_id: "primary"

sync:
  default_range: "Sheet1!A2:I"
  # Lazy read-through cache: the Worker refreshes user settings from the
  # spreadsheet only when the cached snapshot is older than this many seconds.
  # No GAS, no manual command, no Cloud Scheduler required.
  cache_ttl_seconds: 3600
  # The spreadsheet lives in a Workspace whose policy blocks sharing files with
  # the service account (gserviceaccount.com counts as an external domain). So
  # the Worker reads the sheet as an authorized *user* via an OAuth refresh
  # token stored in this Secret Manager secret (JSON: client_id, client_secret,
  # refresh_token). If the secret is absent, it falls back to ADC (local dev).
  oauth_secret_id: "kintai-sync-sheets-oauth"
  defaults:
    morning_off_start: "09:00"
    morning_off_end: "13:00"
    afternoon_off_start: "14:00"
    afternoon_off_end: "18:00"
    working_hours_start: "09:00"
    working_hours_end: "18:00"
    timezone: "Asia/Tokyo"
